<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Вход — Molo Admin</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .login-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .login-card {
        width: 100%;
        max-width: 400px;
        background: rgba(255,255,255,.65);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 40px 36px;
      }
      .login-logo {
        display: block;
        height: 48px;
        width: auto;
        object-fit: cover;
        object-position: center;
        border-radius: 8px;
        margin: 0 auto 28px;
        max-width: 180px;
      }
      .login-title {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -.02em;
        text-align: center;
        margin: 0 0 6px;
      }
      .login-sub {
        text-align: center;
        color: var(--muted);
        font-size: 13px;
        margin: 0 0 28px;
      }
      .login-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 14px;
      }
      .login-field label {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: .07em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .login-field input {
        padding: 12px 14px;
        border-radius: 12px;
        border: 1.5px solid var(--border);
        background: var(--bg);
        font-size: 14px;
        font-family: inherit;
        color: var(--ink);
        outline: none;
        transition: border-color .15s, box-shadow .15s;
        width: 100%;
        box-sizing: border-box;
      }
      .login-field input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(30,58,95,.12);
      }
      .login-btn {
        width: 100%;
        margin-top: 8px;
        padding: 14px;
        border-radius: 999px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        transition: background .15s, transform .1s, box-shadow .15s;
        box-shadow: 0 4px 14px rgba(30,58,95,.25);
      }
      .login-btn:hover {
        background: var(--accent-2);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(30,58,95,.35);
      }
      .login-btn:active { transform: translateY(0); }
      .login-err {
        margin-top: 14px;
        padding: 11px 14px;
        border-radius: 10px;
        background: rgba(185,28,28,.08);
        border: 1px solid rgba(185,28,28,.2);
        color: #b91c1c;
        font-size: 13px;
        font-weight: 600;
        display: none;
        text-align: center;
      }
      .login-err.show { display: block; }
    </style>
  </head>
  <body>
    <div class="login-wrap">
      <div class="login-card">
        <img class="login-logo" src="/images/шапка-обложка-3.png" alt="Molo" />
        <div class="login-title">Вход в админ-панель</div>
        <div class="login-sub">Только для сотрудников</div>

        <form id="login-form" autocomplete="off">
          <div class="login-field">
            <label for="login-user">Логин</label>
            <input id="login-user" type="text" autocomplete="username" placeholder="admin" required />
          </div>
          <div class="login-field">
            <label for="login-pass">Пароль</label>
            <input id="login-pass" type="password" autocomplete="current-password" placeholder="••••••" required />
          </div>
          <button class="login-btn" type="submit">Войти</button>
          <div class="login-err" id="login-err">Неверный логин или пароль</div>
        </form>
      </div>
    </div>

    <script>
      document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        e.stopPropagation();

        var user = document.getElementById('login-user').value.trim();
        var pass = document.getElementById('login-pass').value;
        var err  = document.getElementById('login-err');
        var btn  = document.querySelector('.login-btn');

        err.classList.remove('show');
        btn.disabled = true;
        btn.textContent = 'Проверка...';

        var token = btoa(unescape(encodeURIComponent(user + ':' + pass)));

        fetch('/api/admin/check', {
          method: 'GET',
          headers: { 'Authorization': 'Basic ' + token }
        }).then(function(res) {
          if (res.ok) {
            sessionStorage.setItem('admin-token', token);
            window.location.href = '/admin';
          } else {
            err.textContent = 'Неверный логин или пароль';
            err.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Войти';
          }
        }).catch(function(e) {
          err.textContent = 'Ошибка соединения: ' + e.message;
          err.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Войти';
        });

        return false;
      });
    </script>
  </body>
</html>
