<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Molo — контакты</title>
    <meta name="description" content="Контакты ресторана Molo." />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/" aria-label="На главную">
          <img id="site-logo" src="/images/шапка-обложка-3.png" alt="Molo" />
        </a>
        <nav class="nav" aria-label="Навигация">
          <a id="nav-menu" href="/menu.html">Меню</a>
          <a id="nav-contacts" href="/contacts.html">Контакты</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="container">
          <div class="kicker">Контакты</div>
          <h1 style="margin:10px 0 6px; font-size: clamp(28px, 3.6vw, 44px); letter-spacing:-.02em;">Как нас найти</h1>
          <p class="subtle">Адрес, режим работы и карта.</p>

          <div class="info-grid">
            <div class="info">
              <div class="info-icon">📍</div>
              <div class="label">Адрес</div>
              <div class="value">Москва, Причальный проезд, 10к1</div>
            </div>
            <div class="info">
              <div class="info-icon">🕐</div>
              <div class="label">Время работы</div>
              <div class="value">Ежедневно с 10:00 до 22:00</div>
            </div>
            <div class="info">
              <div class="info-icon">📞</div>
              <div class="label">Телефон</div>
              <div class="value">+7 (969) 063-11-11</div>
            </div>
            <div class="info">
              <div class="info-icon">📲</div>
              <div class="label">Мы в соцсетях</div>
              <div class="value"><a href="https://www.instagram.com/molo.bistro.moscow/" target="_blank" rel="noreferrer" style="color:var(--accent); font-weight:800;">Instagram</a></div>
            </div>
          </div>

          <div class="embed-wrap" style="margin-top:20px;">
            <div style="position:relative; width:100%; padding-bottom:50%; height:0;">
              <iframe
                style="position:absolute;inset:0;width:100%;height:100%;border:0;display:block;"
                src="https://yandex.ru/map-widget/v1/?ll=37.522173%2C55.767905&mode=search&ol=geo&ouri=ymapsbm1%3A%2F%2Fgeo%3Fdata%3DCgg1Njc3MjM5NRJb0KDQvtGB0YHQuNGPLCDQnNC-0YHQutCy0LAsINCf0YDQuNGH0LDQu9GM0L3Ri9C5INC_0YDQvtC10LfQtCwgMTDRjDEiCg1yVhVCFQn6X0I%2C&z=16"
                allowfullscreen="true"
              ></iframe>
            </div>
            <div class="meta-row">
              <div>📍 <b>Причальный проезд, 10к1</b></div>
              <a href="https://yandex.ru/maps/-/CPBHZWkW" target="_blank" rel="noreferrer">Открыть в Яндекс.Картах →</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">© Molo</div>
    </footer>

    <script src="/js/common.js"></script>
  </body>
</html>
