<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Molo — заказать доставку</title>
    <meta name="description" content="Заказать доставку из Molo бистро." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .delivery-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-top: 28px;
      }
      .delivery-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        padding: 32px 24px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(255,255,255,.55);
        box-shadow: 0 4px 16px rgba(0,0,0,.06);
        transition: transform .15s ease, box-shadow .15s ease;
        cursor: pointer;
        text-decoration: none;
        color: var(--ink);
      }
      .delivery-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 32px rgba(30,58,95,.12);
      }
      .delivery-card-icon {
        font-size: 40px;
        margin-bottom: 14px;
      }
      .delivery-card-title {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 18px;
        font-weight: 700;
        color: var(--ink);
        margin-bottom: 8px;
      }
      .delivery-card-desc {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.55;
      }
      .delivery-card.primary {
        border-color: var(--accent);
        background: var(--accent);
      }
      .delivery-card.primary .delivery-card-title,
      .delivery-card.primary .delivery-card-desc {
        color: #fff;
      }
      .delivery-card.primary:hover {
        background: var(--accent-2);
        border-color: var(--accent-2);
      }
      @media (max-width: 700px) {
        .delivery-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/" aria-label="На главную">
          <img id="site-logo" src="/images/лого.jpg" alt="Molo" />
        </a>
        <nav class="nav" aria-label="Навигация">
          <a id="nav-menu" href="/menu.html">Меню</a>
          <a href="/delivery.html" class="nav-delivery active">Заказать доставку</a>
          <a id="nav-contacts" href="/contacts.html">Контакты</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section">
        <div class="container">
          <div class="kicker">Доставка</div>
          <h1 style="margin:10px 0 6px; font-size: clamp(28px, 3.6vw, 44px); letter-spacing:-.02em;">Заказать доставку</h1>
          <p class="subtle">Выберите удобный способ — напишите нам или позвоните.</p>

          <div class="delivery-grid">
            <a href="https://t.me/molo_bistro?text=%D0%94%D0%BE%D0%B1%D1%80%D1%8B%D0%B9%20%D0%B4%D0%B5%D0%BD%D1%8C%2C%20%D1%85%D0%BE%D1%87%D1%83%20%D0%B7%D0%B0%D0%BA%D0%B0%D0%B7%D0%B0%D1%82%D1%8C%20" target="_blank" rel="noreferrer" class="delivery-card primary">
              <div class="delivery-card-icon">✈️</div>
              <div class="delivery-card-title">Telegram</div>
              <div class="delivery-card-desc">Написать нам в Telegram — быстро и удобно</div>
            </a>

            <a href="tel:+79690631111" class="delivery-card">
              <div class="delivery-card-icon">📞</div>
              <div class="delivery-card-title">Позвонить</div>
              <div class="delivery-card-desc">+7 (969) 063-11-11</div>
            </a>

            <a href="https://max.app/+79690631111" target="_blank" rel="noreferrer" class="delivery-card">
              <div class="delivery-card-icon">💬</div>
              <div class="delivery-card-title">Max</div>
              <div class="delivery-card-desc">Написать через мессенджер Max по номеру +7 (969) 063-11-11</div>
            </a>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">© Molo</div>
    </footer>

    <script src="/js/common.js"></script>
  </body>
</html>
