<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Molo — меню</title>
    <meta name="description" content="Меню ресторана Molo." />
    <meta name="keywords" content="молобистро меню, molobistro меню, Molo бистро меню, пицца, паста, завтраки Москва" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://molobistro.ru/menu.html" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/" aria-label="На главную">
          <img id="site-logo" src="/images/лого.jpg" alt="Molo" />
        </a>
        <nav class="nav" aria-label="Навигация">
          <a id="nav-menu" href="/menu.html">Меню</a>
          <a href="/delivery.html" class="nav-delivery">Заказать доставку</a>
          <a id="nav-contacts" href="/contacts.html">Контакты</a>
          <div id="cart-icon-wrap" class="cart-icon-wrap" style="display:none;" aria-label="Корзина">
            <button id="cart-icon-btn" class="cart-icon-btn" aria-label="Открыть корзину">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
              <span id="cart-badge" class="cart-badge" style="display:none;">0</span>
            </button>
          </div>
        </nav>
      </div>
    </header>

    <main>
      <section class="menu-top">
        <div class="container">
          <div class="kicker">Меню</div>
          <h1 style="margin:10px 0 14px; font-size: clamp(28px, 3.6vw, 44px); letter-spacing:-.02em;">Выберите категорию</h1>
          <div class="tabs" id="category-tabs" aria-label="Категории меню"></div>
          <div id="menu-grid" class="menu-grid" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">© Molo</div>
    </footer>

    <script src="/js/common.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/menu.js"></script>
    <script>document.addEventListener('DOMContentLoaded', function(){ if(window.CartUI) window.CartUI.init(); });</script>

    <!-- Cart modal -->
    <div class="cart-modal-overlay" id="cart-modal-overlay" role="dialog" aria-modal="true" aria-label="Корзина">
      <div class="cart-modal">
        <div class="cart-modal-header">
          <span class="cart-modal-title">Корзина</span>
          <button class="cart-modal-close" id="cart-modal-close" aria-label="Закрыть корзину">✕</button>
        </div>

        <!-- Вид корзины -->
        <div id="cart-view">
          <div id="cart-empty-msg" class="cart-empty" style="display:none;">Корзина пуста</div>
          <div id="cart-items-list" class="cart-items-list"></div>
          <div class="cart-total" id="cart-total-wrap">
            <span>Итого:</span>
            <span id="cart-total-amount">0 ₽</span>
          </div>
          <button class="btn cart-checkout-btn" id="cart-checkout-btn" style="display:none;">Оформить заказ</button>
        </div>

        <!-- Форма оформления -->
        <div id="cart-form-view" style="display:none;">
          <button class="cart-form-back" id="order-form-back" type="button">← Назад</button>
          <h2 class="cart-form-title">Оформление заказа</h2>
          <div class="cart-form-field">
            <label for="order-name">Имя <span class="required">*</span></label>
            <input type="text" id="order-name" name="order-name" placeholder="Ваше имя" autocomplete="name" required />
            <span class="field-error" id="order-name-error" style="display:none;"></span>
          </div>
          <div class="cart-form-field">
            <label for="order-phone">Телефон <span class="required">*</span></label>
            <input type="tel" id="order-phone" name="order-phone" placeholder="+7 (999) 000-00-00" autocomplete="tel" required />
            <span class="field-error" id="order-phone-error" style="display:none;"></span>
          </div>
          <div class="cart-form-field">
            <label for="order-email">Email <span class="optional">(необязательно)</span></label>
            <input type="email" id="order-email" name="order-email" placeholder="you@example.com" autocomplete="email" />
            <span class="field-error" id="order-email-error" style="display:none;"></span>
          </div>
          <div class="cart-form-field">
            <label>Способ получения</label>
            <div class="cart-pickup-toggle">
              <label class="toggle-label">
                <input type="radio" name="delivery_type" value="self" checked />
                <span>Самовывоз</span>
              </label>
              <label class="toggle-label">
                <input type="radio" name="delivery_type" value="courier" />
                <span>Доставка</span>
              </label>
            </div>
          </div>

          <!-- Поля для самовывоза -->
          <div id="cart-pickup-fields" class="cart-delivery-group">
            <div class="cart-form-field">
              <label for="order-pickup-time">Время самовывоза</label>
              <input type="text" id="order-pickup-time" placeholder="Как можно скорее или время" />
            </div>
          </div>

          <!-- Поля для доставки -->
          <div id="cart-delivery-fields" class="cart-delivery-group" style="display:none;">
            <div class="cart-form-field">
              <label for="order-address">Адрес доставки <span class="required">*</span></label>
              <input type="text" id="order-address" placeholder="Улица, дом, квартира" />
              <span class="field-error" id="order-address-error" style="display:none;"></span>
            </div>
            <div class="cart-form-field">
              <label for="order-delivery-time">Время доставки</label>
              <input type="text" id="order-delivery-time" placeholder="Как можно скорее или время" />
            </div>
            <div class="cart-form-field">
              <label for="order-comment">Комментарий курьеру <span class="optional">(необязательно)</span></label>
              <textarea id="order-comment" rows="2" placeholder="Подъезд, домофон и т.д."></textarea>
            </div>
          </div>

          <!-- Стоимость доставки -->
          <div class="cart-delivery-info" id="cart-delivery-info" style="display:none;">
            <span>Доставка:</span>
            <span id="cart-delivery-cost">200 ₽</span>
          </div>

          <div class="cart-form-field">
            <label for="order-tableware">Количество приборов</label>
            <input type="number" id="order-tableware" value="1" min="1" max="20" />
          </div>

          <span class="field-error" id="order-form-error" style="display:none;"></span>
          <button class="btn" id="order-submit-btn" type="button">Оформить заказ</button>
        </div>
      </div>
    </div>

    <!-- Dish modal -->
    <div class="dish-modal-overlay" id="dish-modal-overlay">
      <div class="dish-modal">
        <button class="dish-modal-close" id="modal-close">✕</button>
        <img class="dish-modal-img" id="modal-img" src="" alt="" />
        <div class="dish-modal-img-placeholder" id="modal-img-placeholder" style="display:none;"></div>
        <div class="dish-modal-body">
          <div class="dish-modal-name" id="modal-name"></div>
          <div class="dish-modal-desc" id="modal-desc"></div>
          <div class="dish-modal-price" id="modal-price"></div>
        </div>
      </div>
    </div>
  </body>
</html>
