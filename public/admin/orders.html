<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Заказы — Molo Admin</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .admin-container { max-width: 1400px; margin: 0 auto; padding: 32px 16px 64px; }
      .admin-header { margin-bottom: 24px; }
      .admin-header h1 { margin: 8px 0 0; font-size: 28px; }
      .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--accent); font-weight: 700; text-decoration: none; margin-bottom: 12px; }
      .back-link:hover { text-decoration: underline; }
      .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
      .stat-card { padding: 18px 20px; background: rgba(255,255,255,.55); border: 1px solid var(--border); border-radius: var(--radius); }
      .stat-num { font-size: 28px; font-weight: 800; color: var(--accent); line-height: 1; }
      .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
      .panel { background: rgba(255,255,255,.55); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
      .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 14px; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
      .panel-title { font-size: 16px; font-weight: 800; letter-spacing: -.01em; margin: 0; }
      .btn-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      .btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px; border-radius: 999px; background: var(--accent); color: var(--bg); border: 1.5px solid var(--accent); font-size: 13px; font-weight: 700; cursor: pointer; }
      .btn-ghost { display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border-radius: 999px; background: transparent; color: var(--accent); border: 1.5px solid var(--border); font-size: 13px; font-weight: 700; cursor: pointer; }
      .btn-edit { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 999px; background: transparent; color: var(--accent); border: 1.5px solid var(--border); font-size: 12px; font-weight: 700; cursor: pointer; }
      select, input[type="search"], input[type="date"] { padding: 8px 12px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--bg); font-size: 13px; }
      .data-table { width: 100%; border-collapse: collapse; }
      .data-table th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); border-bottom: 1.5px solid var(--border); background: rgba(30,58,95,.04); }
      .data-table td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid rgba(30,58,95,.08); }
      .data-table tr:last-child td { border-bottom: 0; }
      .data-table tr:hover td { background: rgba(30,58,95,.03); }
      .status-pill { display:inline-flex; padding:4px 10px; border-radius:999px; font-size:11px; font-weight:700; }
      .status-pending { background:#fef3c7; color:#92400e; }
      .status-paid { background:#d1fae5; color:#065f46; }
      .status-failed { background:#fee2e2; color:#991b1b; }
      .status-ready { background:#dbeafe; color:#1e40af; }
      .status-completed { background:#d1fae5; color:#065f46; }
      .status-cancelled { background:#f3f4f6; color:#6b7280; }
      .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:1000; opacity:0; visibility:hidden; transition:.2s ease; }
      .modal-overlay.show { opacity:1; visibility:visible; }
      .modal { background:#fff; border-radius:16px; max-width:560px; width:90%; max-height:85vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.2); }
      .modal-head { display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--border); }
      .modal-title { font-size:18px; font-weight:800; margin:0; }
      .modal-close { background:none; border:none; font-size:24px; cursor:pointer; color:var(--muted); }
      .modal-body { padding:22px; }
      .modal-footer { display:flex; gap:10px; justify-content:flex-end; padding:18px 22px; border-top:1px solid var(--border); }
      .order-detail-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid rgba(30,58,95,.08); }
      .order-item { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(30,58,95,.08); }
      .toast { position: fixed; bottom: 24px; right: 24px; padding: 13px 20px; border-radius: 12px; background: var(--accent); color: var(--bg); font-size: 13px; font-weight: 700; box-shadow: 0 8px 24px rgba(0,0,0,.18); opacity: 0; transform: translateY(10px); transition: .2s ease; pointer-events: none; z-index: 999; }
      .toast.show { opacity: 1; transform: translateY(0); }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="/">
          <img id="site-logo" src="/images/лого.jpg" alt="Molo" />
        </a>
        <nav class="nav">
          <a href="/admin">Админ</a>
          <a href="#" onclick="sessionStorage.removeItem('admin-token'); window.location.href='/login.html'; return false;" style="color:#b91c1c;">Выйти</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="admin-container">
        <div class="admin-header">
          <a class="back-link" href="/admin">← Назад в админку</a>
          <h1>Заказы</h1>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-num" id="stat-orders">—</div>
            <div class="stat-label">Заказов сегодня</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" id="stat-revenue">—</div>
            <div class="stat-label">Выручка</div>
          </div>
          <div class="stat-card">
            <div class="stat-num" id="stat-avg-check">—</div>
            <div class="stat-label">Средний чек</div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2 class="panel-title">Все заказы</h2>
            <div class="btn-row">
              <select id="filter-status">
                <option value="">Все статусы</option>
                <option value="pending">Новый</option>
                <option value="paid">Оплачен</option>
                <option value="failed">Ошибка оплаты</option>
                <option value="ready">Готов</option>
                <option value="completed">Завершён</option>
                <option value="cancelled">Отменён</option>
              </select>
              <select id="filter-type">
                <option value="">Все</option>
                <option value="self">Самовывоз</option>
                <option value="courier">Доста��ка</option>
              </select>
              <input type="search" id="search-orders" placeholder="Поиск..." style="width: 200px;" />
              <button class="btn-primary" onclick="exportOrders()">Экспорт CSV</button>
            </div>
          </div>
          <table class="data-table">
            <thead>
              <tr>
                <th>№</th>
                <th>Дата</th>
                <th>Клиент</th>
                <th>Тип</th>
                <th>Сумма</th>
                <th>Статус</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody id="orders-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay" id="order-modal">
      <div class="modal">
        <div class="modal-head">
          <h3 class="modal-title" id="order-modal-title">Заказ #</h3>
          <button class="modal-close" onclick="closeOrderModal()">×</button>
        </div>
        <div class="modal-body" id="order-modal-body"></div>
        <div class="modal-footer">
          <button class="btn-ghost" onclick="closeOrderModal()">Закрыть</button>
        </div>
      </div>
    </div>

    <script>
      // Simple auth check
      function getToken() {
        const stored = sessionStorage.getItem('admin-token');
        if (stored) return stored;
        const meta = document.querySelector('meta[name="admin-token"]');
        return meta ? meta.content : '';
      }

      if (!getToken()) {
        window.location.href = '/login.html';
      }

      async function api(path, opts = {}) {
        const res = await fetch(path, {
          ...opts,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Basic ' + getToken(),
            ...(opts.headers || {})
          }
        });
        if (res.status === 204) return null;
        const data = await res.json().catch(() => null);
        if (!res.ok) throw new Error(data?.error || 'HTTP ' + res.status);
        return data;
      }

      let allOrders = [];

      async function loadOrders() {
        try {
          allOrders = await api('/api/orders');
          applyOrderFilters();
        } catch (e) {
          showToast('Ошибка загрузки: ' + e.message, true);
        }
      }

      function applyOrderFilters() {
        const statusFilter = document.getElementById('filter-status').value;
        const typeFilter = document.getElementById('filter-type').value;
        const search = document.getElementById('search-orders').value.toLowerCase();

        let filtered = allOrders.filter(o => {
          if (statusFilter && o.status !== statusFilter) return false;
          if (typeFilter && o.delivery_type !== typeFilter) return false;
          if (search) {
            const searchStr = (o.order_number || '') + ' ' + (o.customer_name || '') + ' ' + (o.customer_phone || '');
            if (!searchStr.toLowerCase().includes(search)) return false;
          }
          return true;
        });

        renderOrders(filtered);
        updateStats(filtered);
      }

      function renderOrders(orders) {
        const tbody = document.getElementById('orders-tbody');
        if (!orders.length) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted);">Заказов нет</td></tr>';
          return;
        }

        tbody.innerHTML = orders.map(o => {
          const date = new Date(o.created_at).toLocaleString('ru');
          const total = Number(o.total_amount || 0).toFixed(0);
          const type = o.delivery_type === 'courier' ? 'Доставка' : 'Самовывоз';
          const statusClass = 'status-' + (o.status || 'pending');
          const statusText = { pending: 'Новый', paid: 'Оплачен', failed: 'Ошибка', ready: 'Готов', completed: 'Завершён', cancelled: 'Отменён' }[o.status] || o.status;

          return '<tr>' +
            '<td><b>' + (o.order_number || '#' + o.id) + '</b></td>' +
            '<td>' + date + '</td>' +
            '<td>' + (o.customer_name || '-') + '<br><small style="color:var(--muted)">' + (o.customer_phone || '') + '</small></td>' +
            '<td>' + type + '</td>' +
            '<td><b>' + total + ' ₽</b></td>' +
            '<td><span class="status-pill ' + statusClass + '">' + statusText + '</span></td>' +
            '<td><button class="btn-edit" onclick="showOrderDetails(' + o.id + ')">Подробнее</button></td>' +
          '</tr>';
        }).join('');
      }

      function updateStats(orders) {
        const today = new Date().toDateString();
        const todayOrders = orders.filter(o => new Date(o.created_at).toDateString() === today);
        const total = todayOrders.reduce((s, o) => s + Number(o.total_amount || 0), 0);
        const avg = todayOrders.length ? total / todayOrders.length : 0;

        document.getElementById('stat-orders').textContent = todayOrders.length;
        document.getElementById('stat-revenue').textContent = total.toFixed(0) + ' ₽';
        document.getElementById('stat-avg-check').textContent = avg.toFixed(0) + ' ₽';
      }

      function showOrderDetails(id) {
        const order = allOrders.find(o => o.id === id);
        if (!order) return;

        const items = JSON.parse(order.items || '[]');
        let itemsHtml = items.map(i => '<div class="order-item"><span>' + i.name + ' × ' + i.quantity + '</span><span>' + (i.price * i.quantity).toFixed(0) + ' ₽</span></div>').join('');

        document.getElementById('order-modal-title').textContent = 'Заказ ' + (order.order_number || '#' + order.id);
        document.getElementById('order-modal-body').innerHTML =
          '<div class="order-detail-row"><span>Клиент</span><b>' + (order.customer_name || '-') + '</b></div>' +
          '<div class="order-detail-row"><span>Телефон</span><b>' + (order.customer_phone || '-') + '</b></div>' +
          '<div class="order-detail-row"><span>Тип</span><b>' + (order.delivery_type === 'courier' ? 'Доставка' : 'Самовывоз') + '</b></div>' +
          (order.delivery_address ? '<div class="order-detail-row"><span>Адрес</span><b>' + order.delivery_address + '</b></div>' : '') +
          '<div class="order-detail-row"><span>Оплата</span><b>' + (order.payment_method === 'online' ? 'Онлайн' : 'Наличными') + '</b></div>' +
          '<div class="order-detail-row"><span>Статус</span><b>' + (order.status || 'pending') + '</b></div>' +
          '<h4 style="margin:16px 0 8px;">Состав</h4>' + itemsHtml +
          '<div class="order-detail-row" style="margin-top:16px"><span>Итого</span><b>' + Number(order.total_amount || 0).toFixed(0) + ' ₽</b></div>';

        document.getElementById('order-modal').classList.add('show');
      }

      function closeOrderModal() {
        document.getElementById('order-modal').classList.remove('show');
      }

      function showToast(msg, err) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast' + (err ? ' err' : '') + ' show';
        setTimeout(() => t.classList.remove('show'), 3000);
      }

      function exportOrders() {
        let csv = 'Номер,Дата,Клиент,Телефон,Тип,Сумма,Статус\n';
        allOrders.forEach(o => {
          csv += '"' + (o.order_number || o.id) + '",';
          csv += '"' + new Date(o.created_at).toLocaleString('ru') + '",';
          csv += '"' + (o.customer_name || '') + '",';
          csv += '"' + (o.customer_phone || '') + '",';
          csv += '"' + (o.delivery_type === 'courier' ? 'Доставка' : 'Самовывоз') + '",';
          csv += (o.total_amount || 0) + ',';
          csv += '"' + (o.status || '') + '"\n';
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'orders.csv';
        link.click();
      }

      // Event listeners
      document.getElementById('filter-status').addEventListener('change', applyOrderFilters);
      document.getElementById('filter-type').addEventListener('change', applyOrderFilters);
      document.getElementById('search-orders').addEventListener('input', applyOrderFilters);

      loadOrders();
    </script>
  </body>
</html>
